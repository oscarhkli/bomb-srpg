name: CI & Coverage

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  unit_tests:
    name: "Run Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "^1.26.3"

      - name: Run Tests with Coverage
        run: go test -race -cover -coverprofile=coverage.txt ./cli/... ./engine/... ./server/...

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: coverage.txt

  code_coverage:
    name: "Generate Coverage Report"
    if: github.event_name == 'pull_request' # Only comment on Pull Requests
    runs-on: ubuntu-latest
    needs: unit_tests
    permissions:
      contents: read
      actions: read # Required to download the baseline report from previous runs
      pull-requests: write # Required to post comments on your PRs
    # This env block silences the Node.js 20 warning completely
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Go Coverage Report Action
        uses: fgrosse/go-coverage-report@v1.3.0
        with:
          coverage-artifact-name: "code-coverage"
          coverage-file-name: "coverage.txt"
          root-package: "bomb-srpg"
          exclude: "models\\.go"
