name: CI & Coverage

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - 'main' # Adjust this if your default branch is named 'master'

jobs:
  unit_tests:
    name: "Run Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.22' # Update this to match your project's Go version

      - name: Run Tests with Coverage
        run: go test -cover -coverprofile=coverage.txt ./...

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: coverage.txt

  code_coverage:
    name: "Generate Coverage Report"
    if: github.event_name == 'pull_request' # Only comment on Pull Requests
    runs-on: ubuntu-latest
    needs: unit_tests
    permissions:
      contents: read
      actions: read       # Required to download the baseline report from previous runs
      pull-requests: write # Required to post comments on your PRs
    steps:
      - name: Run Go Coverage Report Action
        uses: fgrosse/go-coverage-report@v1.3.0
        with:
          coverage-artifact-name: "code-coverage"
          coverage-file-name: "coverage.txt"